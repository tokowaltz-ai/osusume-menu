<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>本日のおすすめ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#C0392B;--red-dark:#922B21;--red-light:#FAEDEC;
  --ink:#1a1a1a;--muted:#666;--border:#E0D9D0;
  --bg:#FDFAF7;--card:#FFFFFF;
}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink)}
#app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto}
.header{background:var(--red);color:#fff;padding:14px 16px 12px;flex-shrink:0}
.header-title{font-family:'Shippori Mincho',serif;font-size:19px;font-weight:700;letter-spacing:.05em}
.header-sub{font-size:11px;opacity:.8;margin-top:2px}
.header-date{font-size:11px;opacity:.8;line-height:1.6}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:12px 0;font-size:13px;font-weight:500;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;-webkit-tap-highlight-color:transparent}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.view{display:none;flex-direction:column;flex:1;overflow-y:auto}
.view.active{display:flex}
.menu-view{padding:16px;gap:16px}
.menu-empty{text-align:center;padding:60px 24px;color:var(--muted)}
.menu-empty .icon{font-size:52px;margin-bottom:14px}
.menu-empty p{font-size:14px;line-height:1.8}
.menu-card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:16px}
.menu-img-wrap{width:100%;height:200px;background:var(--red-light);display:flex;align-items:center;justify-content:center;overflow:hidden}
.menu-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.menu-img-placeholder{font-size:52px}
.menu-body{padding:16px}
.menu-badge{display:inline-block;background:var(--red);color:#fff;font-size:10px;padding:3px 10px;border-radius:20px;margin-bottom:10px;letter-spacing:.1em;font-weight:500}
.menu-name{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:700;margin-bottom:6px;line-height:1.4}
.menu-price{font-size:24px;font-weight:700;color:var(--red);margin-bottom:10px}
.menu-price small{font-size:13px;font-weight:400;color:var(--muted)}
.menu-desc{font-size:13px;color:var(--muted);line-height:1.8}
.admin-view{padding:16px;gap:12px}
.section-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.1em;margin-bottom:2px}
.item-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:10px}
.item-card-row{display:flex;align-items:flex-start;gap:12px}
.item-thumb{width:58px;height:58px;border-radius:8px;background:var(--red-light);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden}
.item-thumb img{width:100%;height:100%;object-fit:cover}
.item-info{flex:1;min-width:0}
.item-name{font-weight:700;font-size:15px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-price{font-size:14px;color:var(--red);font-weight:500;margin-bottom:4px}
.item-desc{font-size:12px;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-actions{display:flex;gap:6px;margin-top:10px;justify-content:flex-end}
.btn-sm{border:1px solid var(--border);border-radius:7px;padding:6px 14px;font-size:12px;cursor:pointer;background:#fff;color:var(--ink);font-family:'Noto Sans JP',sans-serif}
.btn-sm.danger{border-color:#ffcdd2;color:var(--red)}
.btn-sm.primary{border-color:var(--red);color:var(--red)}
.add-btn{display:flex;align-items:center;justify-content:center;background:var(--red);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;width:100%}
.add-btn:disabled{background:#ccc;cursor:not-allowed}
.empty-admin{text-align:center;padding:30px 20px;color:var(--muted);font-size:13px;background:var(--card);border-radius:12px;border:1.5px dashed var(--border);line-height:1.8;margin-bottom:10px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px 40px;transform:translateY(40px);transition:transform .3s}
.overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:#ddd;border-radius:99px;margin:0 auto 18px}
.sheet-title{font-family:'Shippori Mincho',serif;font-size:19px;font-weight:700;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.sheet-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted)}
.fgroup{margin-bottom:16px}
.flabel{font-size:12px;color:var(--muted);margin-bottom:6px;display:block;font-weight:500}
.freq{color:var(--red);margin-left:2px}
.finput{width:100%;border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:16px;font-family:'Noto Sans JP',sans-serif;background:#fff;color:var(--ink);outline:none;-webkit-appearance:none}
.finput:focus{border-color:var(--red)}
textarea.finput{resize:none;height:90px;line-height:1.7}
.img-upload-area{border:1.5px dashed var(--border);border-radius:12px;overflow:hidden;background:var(--red-light);cursor:pointer;position:relative}
.img-upload-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:140px;gap:8px}
.img-upload-icon{font-size:36px}
.img-upload-text{font-size:13px;color:var(--muted)}
.img-upload-sub{font-size:11px;color:#aaa}
.img-preview-wrap{position:relative;height:180px}
.img-preview-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.img-remove-btn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.file-input{display:none}
.upload-progress{height:3px;background:var(--red-light);margin-top:6px;border-radius:99px;overflow:hidden;display:none}
.upload-bar{height:100%;background:var(--red);width:0%;transition:width .3s}
.save-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'Noto Sans JP',sans-serif}
.save-btn:disabled{background:#ccc}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;transition:all .3s;z-index:500;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.crop-overlay{position:fixed;inset:0;background:#000;z-index:300;display:none;flex-direction:column}
.crop-overlay.open{display:flex}
.crop-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;color:#fff;flex-shrink:0;background:#111}
.crop-title{font-size:15px;font-weight:500}
.crop-cancel{background:none;border:none;color:#aaa;font-size:14px;cursor:pointer;padding:6px 10px;font-family:'Noto Sans JP',sans-serif}
.crop-area{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000}
.crop-area img{max-width:90%;max-height:90%;object-fit:contain;display:block;transition:transform 0.3s ease;transform-origin:center center}
.crop-hint{color:#666;font-size:11px;text-align:center;padding:8px 16px;background:#111;flex-shrink:0}
.crop-tools{display:flex;align-items:center;justify-content:center;gap:12px;padding:16px;background:#111;flex-shrink:0}
.crop-btn{background:#333;border:none;color:#fff;border-radius:10px;padding:12px 20px;font-size:14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.crop-done{background:var(--red);border:none;color:#fff;border-radius:10px;padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div style="width:100%">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <div style="font-family:'Shippori Mincho',serif;font-size:17px;font-weight:700;letter-spacing:.1em">お好み焼ふじ</div>
        <div style="font-size:13px;font-weight:700;letter-spacing:.05em">@いわのクリエイト</div>
      </div>
      <div class="header-title">本日のおすすめ</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">
        <div class="header-sub">Today's Special Menu</div>
        <div class="header-date" id="today-date"></div>
      </div>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active" data-tab="menu">メニュー表示</div>
    <div class="tab" data-tab="admin" id="tab-admin">⚙ 管理・設定</div>
  </div>
  <div class="view menu-view active" id="view-menu">
    <div class="loading" id="menu-loading">読み込み中...</div>
    <div id="menu-list"></div>
  </div>
  <div class="view admin-view" id="view-admin">
    <div class="section-label">本日のおすすめ（最大3品）</div>
    <div id="admin-list"></div>
    <button class="add-btn" id="add-btn">＋ メニューを追加する</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      <span id="sheet-title-text">メニューを追加</span>
      <button class="sheet-close" id="sheet-close-btn">✕</button>
    </div>
    <div class="fgroup">
      <label class="flabel">料理名<span class="freq">*</span></label>
      <input class="finput" id="f-name" type="text" placeholder="例：ねぎ焼き スペシャル">
    </div>
    <div class="fgroup">
      <label class="flabel">金額<span class="freq">*</span></label>
      <input class="finput" id="f-price" type="number" inputmode="numeric" placeholder="例：980">
    </div>
    <div class="fgroup">
      <label class="flabel">説明文（任意）</label>
      <textarea class="finput" id="f-desc" placeholder="例：国産キャベツをたっぷり使った自慢の一品。"></textarea>
    </div>
    <div class="fgroup">
      <label class="flabel">写真（任意）</label>
      <div class="img-upload-area" id="img-area">
        <div class="img-upload-placeholder" id="img-placeholder">
          <div class="img-upload-icon">📷</div>
          <div class="img-upload-text">タップして写真を選ぶ</div>
          <div class="img-upload-sub">カメラ撮影も可能です</div>
        </div>
        <div class="img-preview-wrap" id="img-preview-wrap" style="display:none">
          <img id="img-preview" src="" alt="">
          <button class="img-remove-btn" id="img-remove-btn">✕</button>
        </div>
      </div>
      <div class="upload-progress" id="upload-progress">
        <div class="upload-bar" id="upload-bar"></div>
      </div>
      <input class="file-input" type="file" id="f-img" accept="image/*">
    </div>
    <button class="save-btn" id="save-btn">保存する</button>
  </div>
</div>

<div class="crop-overlay" id="crop-overlay">
  <div class="crop-header">
    <div class="crop-title">✂️ 写真を編集</div>
    <button class="crop-cancel" id="crop-cancel-btn">キャンセル</button>
  </div>
  <div class="crop-area" id="crop-area">
    <img id="crop-img" src="" alt="">
  </div>
  <div class="crop-hint">ピンチで拡大縮小・ドラッグで位置調整</div>
  <div class="crop-tools">
    <button class="crop-btn" id="rotate-left-btn">↺ 左回転</button>
    <button class="crop-btn" id="rotate-right-btn">↻ 右回転</button>
    <button class="crop-done" id="crop-done-btn">決定</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, remove, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

// ============================================================
// ★ ここにFirebaseの設定を貼り付けてください
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyDBRbrhM7eP7OSuofNQr1AcF4GFb-Gvl1Y",
  authDomain: "osusume-menu-26fbf.firebaseapp.com",
  databaseURL: "https://osusume-menu-26fbf-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "osusume-menu-26fbf",
  storageBucket: "osusume-menu-26fbf.firebasestorage.app",
  messagingSenderId: "346078919165",
  appId: "1:346078919165:web:0d125a878698279e7c8194"
};
// ============================================================

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const storage = getStorage(fbApp);
const menuRef = ref(db, 'menu');

// 日付
const w=['日','月','火','水','木','金','土'];
const d=new Date();
document.getElementById('today-date').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w[d.getDay()]}）`;

// admin判定
if(!location.search.includes('admin')) document.getElementById('tab-admin').style.display='none';

// 状態
let items=[];
let editKey=null;
let pendingFile=null;
let currentImgUrl=null;
let currentImgPath=null;
let cropRotation=0;
let cropScale=1, cropX=0, cropY=0;
let pinchStartDist=0, pinchStartScale=1;
let dragStartX=0, dragStartY=0, isDragging=false;

// ===== Firebase =====
onValue(menuRef, snap=>{
  items=[];
  if(snap.exists()){
    snap.forEach(child=>{
      items.push({key:child.key, ...child.val()});
    });
  }
  document.getElementById('menu-loading').style.display='none';
  renderMenu();
  renderAdmin();
});

function renderMenu(){
  const el=document.getElementById('menu-list');
  if(!items.length){
    el.innerHTML=`<div class="menu-empty"><div class="icon">🍽️</div><p>本日のおすすめメニューは<br>まだ登録されていません</p></div>`;
    return;
  }
  let html='';
  for(let i=0;i<items.length;i++){
    const it=items[i];
    html+=`<div class="menu-card">`;
    html+=`<div class="menu-img-wrap">`;
    if(it.imgUrl) html+=`<img src="${it.imgUrl}" alt="${esc(it.name)}" loading="lazy">`;
    else html+=`<div class="menu-img-placeholder">🍳</div>`;
    html+=`</div>`;
    html+=`<div class="menu-body">`;
    html+=`<div class="menu-badge">おすすめ ${i+1}</div>`;
    html+=`<div class="menu-name">${esc(it.name)}</div>`;
    html+=`<div class="menu-price">¥${Number(it.price).toLocaleString()}<small>（税込）</small></div>`;
    if(it.desc) html+=`<div class="menu-desc">${esc(it.desc)}</div>`;
    html+=`</div></div>`;
  }
  el.innerHTML=html;
}

function renderAdmin(){
  const el=document.getElementById('admin-list');
  document.getElementById('add-btn').disabled=items.length>=3;
  if(!items.length){
    el.innerHTML=`<div class="empty-admin">まだメニューが登録されていません<br>下のボタンから追加してください</div>`;
    return;
  }
  let html='';
  for(let i=0;i<items.length;i++){
    const it=items[i];
    html+=`<div class="item-card">`;
    html+=`<div class="item-card-row">`;
    html+=`<div class="item-thumb">${it.imgUrl?`<img src="${it.imgUrl}" alt="">`:`🍳`}</div>`;
    html+=`<div class="item-info">`;
    html+=`<div class="item-name">${esc(it.name)}</div>`;
    html+=`<div class="item-price">¥${Number(it.price).toLocaleString()}</div>`;
    if(it.desc) html+=`<div class="item-desc">${esc(it.desc)}</div>`;
    html+=`</div></div>`;
    html+=`<div class="item-actions">`;
    html+=`<button class="btn-sm primary" onclick="window._edit('${it.key}')">✏️ 編集</button>`;
    html+=`<button class="btn-sm danger" onclick="window._delete('${it.key}','${it.imgPath||''}')">🗑 削除</button>`;
    html+=`</div></div>`;
  }
  el.innerHTML=html;
}

// グローバル関数として公開
window._edit=function(key){ openForm(key); };
window._delete=async function(key,imgPath){
  if(!confirm('このメニューを削除しますか？'))return;
  try{
    await remove(ref(db,'menu/'+key));
    if(imgPath){ try{ await deleteObject(sref(storage,imgPath)); }catch(e){} }
    showToast('削除しました');
  }catch(e){ showToast('削除に失敗しました'); }
};

// ===== フォーム =====
function openForm(key){
  editKey=key||null;
  pendingFile=null; currentImgUrl=null; currentImgPath=null;
  document.getElementById('f-name').value='';
  document.getElementById('f-price').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-img').value='';
  showImgPlaceholder();
  if(editKey){
    const it=items.find(x=>x.key===editKey);
    if(it){
      document.getElementById('f-name').value=it.name||'';
      document.getElementById('f-price').value=it.price||'';
      document.getElementById('f-desc').value=it.desc||'';
      document.getElementById('sheet-title-text').textContent='メニューを編集';
      if(it.imgUrl){ showImgPreview(it.imgUrl); currentImgUrl=it.imgUrl; currentImgPath=it.imgPath||null; }
    }
  } else {
    document.getElementById('sheet-title-text').textContent='メニューを追加';
  }
  document.getElementById('overlay').classList.add('open');
}

function closeForm(){ document.getElementById('overlay').classList.remove('open'); }

function showImgPreview(url){
  document.getElementById('img-placeholder').style.display='none';
  document.getElementById('img-preview-wrap').style.display='block';
  document.getElementById('img-preview').src=url;
}
function showImgPlaceholder(){
  document.getElementById('img-placeholder').style.display='flex';
  document.getElementById('img-preview-wrap').style.display='none';
  document.getElementById('img-preview').src='';
}

// ===== 保存 =====
document.getElementById('save-btn').addEventListener('click', async ()=>{
  const name=document.getElementById('f-name').value.trim();
  const price=document.getElementById('f-price').value.trim();
  const desc=document.getElementById('f-desc').value.trim();
  if(!name||!price){ showToast('料理名と金額を入力してください'); return; }

  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='保存中...';

  try{
    let imgUrl=currentImgUrl||null;
    let imgPath=currentImgPath||null;

    if(pendingFile){
      // 古い画像を削除
      if(editKey){
        const old=items.find(x=>x.key===editKey);
        if(old&&old.imgPath){ try{ await deleteObject(sref(storage,old.imgPath)); }catch(e){} }
      }
      imgPath='menu-images/'+Date.now()+'.jpg';
      const prog=document.getElementById('upload-progress');
      const bar=document.getElementById('upload-bar');
      prog.style.display='block'; bar.style.width='0%';
      imgUrl=await new Promise((resolve,reject)=>{
        const task=uploadBytesResumable(sref(storage,imgPath),pendingFile);
        task.on('state_changed',
          s=>{ bar.style.width=(s.bytesTransferred/s.totalBytes*100)+'%'; },
          reject,
          async ()=>{ resolve(await getDownloadURL(task.snapshot.ref)); }
        );
      });
      prog.style.display='none';
    }

    const data={
      name:name,
      price:Number(price),
      desc:desc,
      imgUrl:imgUrl,
      imgPath:imgPath
    };

    if(editKey){
      await set(ref(db,'menu/'+editKey), data);
      showToast('更新しました ✓');
    } else {
      await push(menuRef, data);
      showToast('追加しました ✓');
    }
    closeForm();
  } catch(e){
    console.error(e);
    showToast('保存に失敗しました: '+e.message);
  } finally {
    btn.disabled=false;
    btn.textContent='保存する';
  }
});

// ===== 画像選択 =====
document.getElementById('img-area').addEventListener('click',()=>{ document.getElementById('f-img').click(); });
document.getElementById('img-remove-btn').addEventListener('click',e=>{
  e.stopPropagation();
  pendingFile=null; currentImgUrl=null; currentImgPath=null;
  document.getElementById('f-img').value='';
  showImgPlaceholder();
});
document.getElementById('f-img').addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file)return;
  cropRotation=0; cropScale=1; cropX=0; cropY=0;
  const url=URL.createObjectURL(file);
  const img=document.getElementById('crop-img');
  img.onload=()=>{
    img.style.transform='rotate(0deg) scale(1) translate(0px,0px)';
    document.getElementById('crop-overlay').classList.add('open');
  };
  img.src=url;
});

// ===== 回転・ピンチ =====
function updateTransform(){
  document.getElementById('crop-img').style.transform=
    `rotate(${cropRotation}deg) scale(${cropScale}) translate(${cropX}px,${cropY}px)`;
}

document.getElementById('rotate-left-btn').addEventListener('click',()=>{
  cropRotation=(cropRotation-90+360)%360; cropX=0; cropY=0; cropScale=1; updateTransform();
});
document.getElementById('rotate-right-btn').addEventListener('click',()=>{
  cropRotation=(cropRotation+90)%360; cropX=0; cropY=0; cropScale=1; updateTransform();
});

const cropArea=document.getElementById('crop-area');
cropArea.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    pinchStartDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    pinchStartScale=cropScale; isDragging=false;
  } else if(e.touches.length===1){
    isDragging=true; dragStartX=e.touches[0].clientX; dragStartY=e.touches[0].clientY;
  }
  e.preventDefault();
},{passive:false});

cropArea.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    cropScale=Math.min(4,Math.max(0.5,pinchStartScale*(d/pinchStartDist)));
    updateTransform(); isDragging=false;
  } else if(e.touches.length===1&&isDragging){
    cropX+=(e.touches[0].clientX-dragStartX)/cropScale;
    cropY+=(e.touches[0].clientY-dragStartY)/cropScale;
    dragStartX=e.touches[0].clientX; dragStartY=e.touches[0].clientY;
    updateTransform();
  }
  e.preventDefault();
},{passive:false});
cropArea.addEventListener('touchend',()=>{ isDragging=false; });

// ===== 決定 =====
document.getElementById('crop-done-btn').addEventListener('click',()=>{
  const img=document.getElementById('crop-img');
  const size=800;
  const out=document.createElement('canvas');
  out.width=size; out.height=size;
  const ctx=out.getContext('2d');
  ctx.save();
  ctx.translate(size/2, size/2);
  ctx.rotate(cropRotation*Math.PI/180);
  ctx.scale(cropScale, cropScale);
  const isSwapped=(cropRotation===90||cropRotation===270);
  const iw=isSwapped?img.naturalHeight:img.naturalWidth;
  const ih=isSwapped?img.naturalWidth:img.naturalHeight;
  const fit=Math.min(size/iw, size/ih);
  const dw=img.naturalWidth*fit, dh=img.naturalHeight*fit;
  ctx.drawImage(img, cropX-dw/2, cropY-dh/2, dw, dh);
  ctx.restore();
  const dataUrl=out.toDataURL('image/jpeg',0.88);
  const arr=dataUrl.split(','), mime=arr[0].match(/:(.*?);/)[1];
  const bstr=atob(arr[1]); let n=bstr.length; const u8=new Uint8Array(n);
  while(n--){ u8[n]=bstr.charCodeAt(n); }
  pendingFile=new File([u8],'photo.jpg',{type:mime});
  showImgPreview(dataUrl);
  document.getElementById('crop-overlay').classList.remove('open');
});

document.getElementById('crop-cancel-btn').addEventListener('click',()=>{
  document.getElementById('crop-overlay').classList.remove('open');
  document.getElementById('f-img').value='';
});

// ===== タブ =====
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('view-'+t.dataset.tab).classList.add('active');
  });
});
document.getElementById('add-btn').addEventListener('click',()=>openForm());
document.getElementById('sheet-close-btn').addEventListener('click',()=>closeForm());
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('overlay'))closeForm(); });

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
