<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>本日のおすすめ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#C0392B;--red-dark:#922B21;--red-light:#FAEDEC;--red-mid:#E8A09A;
  --ink:#1a1a1a;--muted:#666;--border:#E0D9D0;
  --bg:#FDFAF7;--card:#FFFFFF;
}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink)}
#app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto}

/* ヘッダー */
.header{background:var(--red);color:#fff;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-title{font-family:'Shippori Mincho',serif;font-size:19px;font-weight:700;letter-spacing:.05em}
.header-sub{font-size:11px;opacity:.8;margin-top:2px}
.header-date{font-size:11px;opacity:.8;text-align:right;line-height:1.6}

/* タブ */
.tab-bar{display:flex;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:12px 0;font-size:13px;font-weight:500;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;-webkit-tap-highlight-color:transparent}
.tab.active{color:var(--red);border-bottom-color:var(--red)}

/* ビュー */
.view{display:none;flex-direction:column;flex:1;overflow-y:auto}
.view.active{display:flex}

/* ===== メニュー表示 ===== */
.menu-view{padding:16px;gap:16px}
.menu-empty{text-align:center;padding:60px 24px;color:var(--muted)}
.menu-empty .icon{font-size:52px;margin-bottom:14px}
.menu-empty p{font-size:14px;line-height:1.8}
.menu-card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.menu-card:nth-child(2){animation-delay:.08s}
.menu-card:nth-child(3){animation-delay:.16s}
.menu-img-wrap{width:100%;height:200px;background:var(--red-light);display:flex;align-items:center;justify-content:center;overflow:hidden}
.menu-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.menu-img-placeholder{font-size:52px}
.menu-body{padding:16px}
.menu-badge{display:inline-block;background:var(--red);color:#fff;font-size:10px;padding:3px 10px;border-radius:20px;margin-bottom:10px;letter-spacing:.1em;font-weight:500}
.menu-name{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:700;margin-bottom:6px;line-height:1.4}
.menu-price{font-size:24px;font-weight:700;color:var(--red);margin-bottom:10px}
.menu-price small{font-size:13px;font-weight:400;color:var(--muted)}
.menu-desc{font-size:13px;color:var(--muted);line-height:1.8}

/* ===== 管理画面 ===== */
.admin-view{padding:16px;gap:12px}
.section-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.item-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px}
.item-card-row{display:flex;align-items:flex-start;gap:12px}
.item-thumb{width:58px;height:58px;border-radius:8px;object-fit:cover;background:var(--red-light);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden}
.item-thumb img{width:100%;height:100%;object-fit:cover}
.item-info{flex:1;min-width:0}
.item-name{font-weight:700;font-size:15px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-price{font-size:14px;color:var(--red);font-weight:500;margin-bottom:4px}
.item-desc{font-size:12px;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-actions{display:flex;gap:6px;margin-top:10px;justify-content:flex-end}
.btn-sm{border:1px solid var(--border);border-radius:7px;padding:6px 14px;font-size:12px;cursor:pointer;background:#fff;color:var(--ink);font-family:'Noto Sans JP',sans-serif;-webkit-tap-highlight-color:transparent}
.btn-sm:active{transform:scale(.97)}
.btn-sm.danger{border-color:#ffcdd2;color:var(--red)}
.btn-sm.primary{border-color:var(--red);color:var(--red)}

.add-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--red);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;-webkit-tap-highlight-color:transparent;transition:background .15s}
.add-btn:active{background:var(--red-dark)}
.add-btn:disabled{background:#ccc;cursor:not-allowed}
.empty-admin{text-align:center;padding:30px 20px;color:var(--muted);font-size:13px;background:var(--card);border-radius:12px;border:1.5px dashed var(--border);line-height:1.8}

/* ===== フォーム ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px 40px;transform:translateY(40px);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:#ddd;border-radius:99px;margin:0 auto 18px}
.sheet-title{font-family:'Shippori Mincho',serif;font-size:19px;font-weight:700;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.sheet-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1;padding:2px 4px}
.fgroup{margin-bottom:16px}
.flabel{font-size:12px;color:var(--muted);margin-bottom:6px;display:block;font-weight:500}
.freq{color:var(--red);margin-left:2px}
.finput{width:100%;border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:16px;font-family:'Noto Sans JP',sans-serif;background:#fff;color:var(--ink);outline:none;-webkit-appearance:none}
.finput:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.1)}
textarea.finput{resize:none;height:90px;line-height:1.7}

/* 写真アップロード */
.img-upload-area{border:1.5px dashed var(--border);border-radius:12px;overflow:hidden;background:var(--red-light);position:relative;cursor:pointer;-webkit-tap-highlight-color:transparent}
.img-upload-area:active{opacity:.85}
.img-upload-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:140px;gap:8px}
.img-upload-icon{font-size:36px}
.img-upload-text{font-size:13px;color:var(--muted)}
.img-upload-sub{font-size:11px;color:#aaa}
.img-preview-wrap{position:relative;height:180px}
.img-preview-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.img-remove-btn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.file-input{display:none}
.upload-progress{height:3px;background:var(--red-light);margin-top:6px;border-radius:99px;overflow:hidden;display:none}
.upload-bar{height:100%;background:var(--red);width:0%;transition:width .3s}

.save-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'Noto Sans JP',sans-serif;-webkit-tap-highlight-color:transparent;transition:background .15s}
.save-btn:active{background:var(--red-dark)}
.save-btn:disabled{background:#ccc}

/* トースト */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;transition:all .3s;z-index:500;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ローディング */
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div style="width:100%">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <div style="font-family:'Shippori Mincho',serif;font-size:17px;font-weight:700;letter-spacing:.1em">お好み焼ふじ</div>
        <div style="font-size:13px;font-weight:700;letter-spacing:.05em">@いわのクリエイト</div>
      </div>
      <div class="header-title">本日のおすすめ</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">
        <div class="header-sub">Today's Special Menu</div>
        <div class="header-date" id="today-date"></div>
      </div>
    </div>
  </div>
  <div class="tab-bar" id="tab-bar">
    <div class="tab active" data-tab="menu">メニュー表示</div>
    <div class="tab" data-tab="admin" id="tab-admin">⚙ 管理・設定</div>
  </div>
  <div class="view menu-view active" id="view-menu">
    <div class="loading" id="menu-loading">読み込み中...</div>
    <div id="menu-list" style="display:none"></div>
  </div>
  <div class="view admin-view" id="view-admin">
    <div class="section-label">本日のおすすめ（最大3品）</div>
    <div id="admin-list"></div>
    <button class="add-btn" id="add-btn" onclick="openForm()">＋ メニューを追加する</button>
  </div>
</div>

<!-- フォームシート -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      <span id="sheet-title-text">メニューを追加</span>
      <button class="sheet-close" onclick="closeForm()">✕</button>
    </div>
    <div class="fgroup">
      <label class="flabel">料理名<span class="freq">*</span></label>
      <input class="finput" id="f-name" type="text" placeholder="例：ねぎ焼き スペシャル">
    </div>
    <div class="fgroup">
      <label class="flabel">金額<span class="freq">*</span></label>
      <input class="finput" id="f-price" type="number" inputmode="numeric" placeholder="例：980">
    </div>
    <div class="fgroup">
      <label class="flabel">説明文（任意）</label>
      <textarea class="finput" id="f-desc" placeholder="例：国産キャベツをたっぷり使った自慢の一品。特製ソースで仕上げました。"></textarea>
    </div>
    <div class="fgroup">
      <label class="flabel">写真（任意）</label>
      <div class="img-upload-area" id="img-area" onclick="document.getElementById('f-img').click()">
        <div class="img-upload-placeholder" id="img-placeholder">
          <div class="img-upload-icon">📷</div>
          <div class="img-upload-text">タップして写真を選ぶ</div>
          <div class="img-upload-sub">カメラ撮影も可能です</div>
        </div>
        <div class="img-preview-wrap" id="img-preview-wrap" style="display:none">
          <img id="img-preview" src="" alt="プレビュー">
          <button class="img-remove-btn" onclick="removeImg(event)">✕</button>
        </div>
      </div>
      <div class="upload-progress" id="upload-progress">
        <div class="upload-bar" id="upload-bar"></div>
      </div>
      <input class="file-input" type="file" id="f-img" accept="image/*" onchange="onImgSelect(event)">
    </div>
    <button class="save-btn" id="save-btn" onclick="saveItem()">保存する</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, remove, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

// ============================================================
// ★ ここにFirebaseの設定を貼り付けてください
// ============================================================
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
// ============================================================

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);
const menuRef = ref(db, 'menu');

// ?admin がURLにない場合は管理タブを非表示
const isAdmin = location.search.includes('admin');
if(!isAdmin){
  document.getElementById('tab-admin').style.display='none';
}

let items = [];       // {key, name, price, desc, imgUrl, imgPath}
let editKey = null;
let pendingFile = null;
let pendingPreviewUrl = null;
let currentImgPath = null; // 編集時の既存画像パス

// 日付表示
function today(){
  const d=new Date();
  const w=['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w[d.getDay()]}）`;
}
document.getElementById('today-date').textContent=today();

// Firebase リアルタイム購読
onValue(menuRef, snap=>{
  items=[];
  if(snap.exists()){
    snap.forEach(child=>{
      items.push({key:child.key, ...child.val()});
    });
  }
  document.getElementById('menu-loading').style.display='none';
  document.getElementById('menu-list').style.display='flex';
  document.getElementById('menu-list').style.flexDirection='column';
  document.getElementById('menu-list').style.gap='16px';
  renderMenu();
  renderAdmin();
});

function renderMenu(){
  const el=document.getElementById('menu-list');
  if(items.length===0){
    el.innerHTML=`<div class="menu-empty"><div class="icon">🍽️</div><p>本日のおすすめメニューは<br>まだ登録されていません</p></div>`;
    return;
  }
  el.innerHTML=items.map((it,i)=>`
    <div class="menu-card">
      <div class="menu-img-wrap">
        ${it.imgUrl
          ?`<img src="${it.imgUrl}" alt="${it.name}" loading="lazy">`
          :`<div class="menu-img-placeholder">🍳</div>`}
      </div>
      <div class="menu-body">
        <div class="menu-badge">おすすめ ${i+1}</div>
        <div class="menu-name">${esc(it.name)}</div>
        <div class="menu-price">¥${Number(it.price).toLocaleString()}<small>（税込）</small></div>
        ${it.desc?`<div class="menu-desc">${esc(it.desc)}</div>`:''}
      </div>
    </div>
  `).join('');
}

function renderAdmin(){
  const el=document.getElementById('admin-list');
  document.getElementById('add-btn').disabled=items.length>=3;
  if(items.length===0){
    el.innerHTML=`<div class="empty-admin">まだメニューが登録されていません<br>下のボタンから追加してください</div>`;
    return;
  }
  el.innerHTML=items.map(it=>`
    <div class="item-card">
      <div class="item-card-row">
        <div class="item-thumb">
          ${it.imgUrl?`<img src="${it.imgUrl}" alt="">`:`🍳`}
        </div>
        <div class="item-info">
          <div class="item-name">${esc(it.name)}</div>
          <div class="item-price">¥${Number(it.price).toLocaleString()}</div>
          ${it.desc?`<div class="item-desc">${esc(it.desc)}</div>`:''}
        </div>
      </div>
      <div class="item-actions">
        <button class="btn-sm primary" onclick="window.editItem('${it.key}')">✏️ 編集</button>
        <button class="btn-sm danger" onclick="window.deleteItem('${it.key}','${it.imgPath||''}')">🗑 削除</button>
      </div>
    </div>
  `).join('');
}

// フォームを開く
window.openForm = function(key=null){
  editKey=key;
  pendingFile=null;
  pendingPreviewUrl=null;
  currentImgPath=null;
  document.getElementById('f-name').value='';
  document.getElementById('f-price').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-img').value='';
  showImgPlaceholder();
  if(key){
    const it=items.find(x=>x.key===key);
    if(it){
      document.getElementById('f-name').value=it.name;
      document.getElementById('f-price').value=it.price;
      document.getElementById('f-desc').value=it.desc||'';
      document.getElementById('sheet-title-text').textContent='メニューを編集';
      if(it.imgUrl){
        showImgPreview(it.imgUrl);
        currentImgPath=it.imgPath||null;
      }
    }
  } else {
    document.getElementById('sheet-title-text').textContent='メニューを追加';
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),300);
};

window.closeForm=function(){
  document.getElementById('overlay').classList.remove('open');
};

window.editItem=function(key){ window.openForm(key); };

window.deleteItem=async function(key,imgPath){
  if(!confirm('このメニューを削除しますか？'))return;
  try{
    await remove(ref(db,'menu/'+key));
    if(imgPath){
      try{ await deleteObject(sref(storage,imgPath)); }catch(e){}
    }
    showToast('削除しました');
  }catch(e){ showToast('削除に失敗しました'); }
};

// 画像選択
window.onImgSelect=function(e){
  const file=e.target.files[0];
  if(!file)return;
  pendingFile=file;
  const url=URL.createObjectURL(file);
  pendingPreviewUrl=url;
  showImgPreview(url);
};

window.removeImg=function(e){
  e.stopPropagation();
  pendingFile=null;
  pendingPreviewUrl=null;
  currentImgPath=null;
  document.getElementById('f-img').value='';
  showImgPlaceholder();
};

function showImgPreview(url){
  document.getElementById('img-placeholder').style.display='none';
  document.getElementById('img-preview-wrap').style.display='block';
  document.getElementById('img-preview').src=url;
}
function showImgPlaceholder(){
  document.getElementById('img-placeholder').style.display='flex';
  document.getElementById('img-preview-wrap').style.display='none';
  document.getElementById('img-preview').src='';
}

// 保存
window.saveItem=async function(){
  const name=document.getElementById('f-name').value.trim();
  const price=document.getElementById('f-price').value.trim();
  if(!name||!price){ showToast('料理名と金額を入力してください'); return; }

  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='保存中...';

  try{
    let imgUrl=null, imgPath=null;

    // 既存画像の引き継ぎ（編集時・画像変更なし）
    if(editKey && !pendingFile && currentImgPath){
      const it=items.find(x=>x.key===editKey);
      if(it){ imgUrl=it.imgUrl; imgPath=it.imgPath; }
    }

    // 新しい画像をアップロード
    if(pendingFile){
      // 編集時の古い画像を削除
      if(editKey){
        const old=items.find(x=>x.key===editKey);
        if(old&&old.imgPath){ try{ await deleteObject(sref(storage,old.imgPath)); }catch(e){} }
      }
      const ext=pendingFile.name.split('.').pop()||'jpg';
      imgPath=`menu-images/${Date.now()}.${ext}`;
      const storageRef=sref(storage,imgPath);

      // プログレスバー表示
      const prog=document.getElementById('upload-progress');
      const bar=document.getElementById('upload-bar');
      prog.style.display='block'; bar.style.width='0%';

      imgUrl=await new Promise((res,rej)=>{
        const task=uploadBytesResumable(storageRef,pendingFile);
        task.on('state_changed',
          snap=>{ bar.style.width=(snap.bytesTransferred/snap.totalBytes*100)+'%'; },
          rej,
          async ()=>{ res(await getDownloadURL(task.snapshot.ref)); }
        );
      });
      prog.style.display='none';
    }

    const data={name, price:Number(price), desc:document.getElementById('f-desc').value.trim(), imgUrl:imgUrl||null, imgPath:imgPath||null};

    if(editKey){
      await set(ref(db,'menu/'+editKey), data);
      showToast('更新しました ✓');
    } else {
      await push(menuRef, data);
      showToast('追加しました ✓');
    }
    closeForm();
  }catch(e){
    console.error(e);
    showToast('保存に失敗しました');
  } finally {
    btn.disabled=false; btn.textContent='保存する';
  }
};

// タブ切り替え
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('view-'+t.dataset.tab).classList.add('active');
  });
});

// オーバーレイ背景タップで閉じる
document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('overlay'))closeForm();
});

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
